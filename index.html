<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CsapatNapló</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f4f4;
}

.header{
    background:#2E7D32;
    color:white;
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:bold;
}

.card{

    background:white;
    margin:15px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);

}

label{

    font-weight:bold;
    display:block;
    margin-top:15px;
    margin-bottom:5px;

}

select,
input,
textarea{

width:100%;
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #bbb;

}

textarea{

height:180px;
resize:none;

}

button{

margin-top:20px;
width:100%;
padding:15px;
font-size:18px;
background:#2E7D32;
color:white;
border:none;
border-radius:10px;

}

button:active{

background:#1B5E20;

}

.footer{

text-align:center;
margin-top:20px;
font-size:12px;
color:#777;

}

</style>

</head>

<body>

<div class="header">

CsapatNapló

</div>

<div class="card">

<label>Név</label>

<select id="nev">

<option>Péter</option>
<option>János</option>
<option>Laci</option>

</select>

<label>Dátum</label>

<input type="date" id="datum">

<label>Mai feljegyzés</label>

<textarea
id="jegyzet"
placeholder="Ide írd a feljegyzést..."></textarea>

<button onclick="mentes()">

💾 Mentés

</button>

</div>

<div class="footer">

CsapatNapló v1.0

</div>

<script>

document.getElementById("datum").valueAsDate=new Date();

const googleAppScriptUrl =
"https://script.google.com/macros/s/AKfycbwT73xvF4vRHxPLAdxTP74_hOMn6BOtvRKtaRTKO_7LKASMwYDRvEg9XNB9QsJOABfv/exec";

function mentes(){

    const nev=document.getElementById("nev").value;
    const datum=document.getElementById("datum").value;
    const jegyzet=document.getElementById("jegyzet").value;

    if(jegyzet.trim()==""){
        alert("Írj feljegyzést!");
        return;
    }

    const adat={
        nev:nev,
        datum:datum,
        jegyzet:jegyzet
    };

    fetch(googleAppScriptUrl,{
        method:"POST",
        body:JSON.stringify(adat)
    })
    .then(()=>{

        alert("✅ Sikeresen elmentve!");

        document.getElementById("jegyzet").value="";

    })
    .catch(err=>{

        alert("Hiba történt!");

        console.log(err);

    });

}

</script>

</body>
</html>
